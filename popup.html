<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACS-FC</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1>MACS-FC</h1>
            <p class="subtitle">Universal File Compressor</p>
        </header>

        <main>
            <div class="upload-zone" id="drop-zone">
                <input type="file" id="file-input" class="file-input" accept=".txt,.csv,.jpg,.png,.mp3,.wav,.mp4,.pdf,.gz">
                <label for="file-input" class="upload-label">
                    <span id="file-name">Click or drag file here</span>
                    <span class="file-types">Supported: TXT, CSV, JPG, PNG, MP3, WAV, MP4, PDF, GZ</span>
                </label>
            </div>

            <div class="action-group">
                <button id="btn-compress" class="btn primary-btn" disabled>Compress File</button>
                <button id="btn-decompress" class="btn secondary-btn" disabled>Decompress File</button>
            </div>

            <div id="error-message" class="alert error hidden"></div>

            <div id="results-dashboard" class="dashboard hidden">
                <h3>Processing Results</h3>
                
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Original</span>
                        <span class="metric-value" id="val-original">--</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Compressed</span>
                        <span class="metric-value" id="val-compressed">--</span>
                    </div>
                    <div class="metric-card highlight">
                        <span class="metric-label">Ratio</span>
                        <span class="metric-value" id="val-ratio">--</span>
                    </div>
                    <div class="metric-card highlight">
                        <span class="metric-label">Savings</span>
                        <span class="metric-value" id="val-savings">--</span>
                    </div>
                </div>

                <div id="verification-status" class="verification-box hidden"></div>

                <button id="btn-download" class="btn download-btn hidden">Download Result</button>
            </div>
        </main>
    </div>

    <script src="lib/lamejs.min.js"></script>
    <script src="lib/pako.min.js"></script>
    <script src="lib/upng.min.js"></script>
    <script src="lib/jpeg-js.min.js"></script> <script src="lib/ffmpeg.min.js"></script>

    <script src="scripts/ui/dom-handler.js" type="module"></script>
</body>
</html>
